services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "redispass", "--databases", "32"]
    ports:
      - "6379:6379"

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             celery -A app.celery_app.celery_app worker --loglevel=INFO --hostname=worker@%h --pool=threads --concurrency=2 --prefetch-multiplier=1 -Q demo"
    depends_on:
      - redis
