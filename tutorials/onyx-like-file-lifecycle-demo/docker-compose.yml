services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "redispass", "--databases", "32"]
    ports:
      - "6380:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8010:8000"
    depends_on:
      - redis
      - postgres
      - minio

  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             celery -A app.celery_app.celery_app worker --loglevel=INFO --hostname=worker@%h --pool=threads --concurrency=2 --prefetch-multiplier=1 -Q file_delete,demo_default"
    depends_on:
      - redis
      - postgres
      - minio

volumes:
  pg_data:
  minio_data:
