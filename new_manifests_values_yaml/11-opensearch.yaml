apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: onyx-infra
spec:
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: onyx-infra
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      securityContext:
        runAsUser: 1001000000
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        - name: opensearch-data
          persistentVolumeClaim:
            claimName: opensearch-pvc
      containers:
        - name: opensearch
          # Build from new_manifests_values_yaml/opensearch-custom/Dockerfile
          # and push to your registry, then replace this image reference.
          image: your-registry/onyx-opensearch:3.4.0-uid-arbitrary
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          env:
            - name: discovery.type
              value: single-node
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-opensearch
                  key: opensearch_admin_password
            - name: bootstrap.memory_lock
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xmx4g -Xms4g"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
          resources:
            requests: {cpu: "2000m", memory: "4Gi"}
            limits: {cpu: "4000m", memory: "8Gi"}
