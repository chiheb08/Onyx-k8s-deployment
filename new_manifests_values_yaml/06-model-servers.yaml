apiVersion: v1
kind: Service
metadata:
  name: inference-model-server
  namespace: onyx-infra
spec:
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: inference-model-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-model-server
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-model-server
  template:
    metadata:
      labels:
        app: inference-model-server
    spec:
      containers:
        - name: inference-model-server
          image: onyxdotapp/onyx-model-server:v3.1.1
          command: ["uvicorn", "model_server.main:app", "--host", "0.0.0.0", "--port", "9000"]
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: indexing-model-server
  namespace: onyx-infra
spec:
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: indexing-model-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexing-model-server
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indexing-model-server
  template:
    metadata:
      labels:
        app: indexing-model-server
    spec:
      containers:
        - name: indexing-model-server
          image: onyxdotapp/onyx-model-server:v3.1.1
          command: ["uvicorn", "model_server.main:app", "--host", "0.0.0.0", "--port", "9000"]
          env:
            - name: INDEXING_ONLY
              value: "true"
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: 1
              memory: 2Gi
            limits:
              cpu: 3
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
