# MinIO / S3 credentials for CloudNativePG barman backups.
# Copy values from secret onyx-objectstorage or your real MinIO keys.
apiVersion: v1
kind: Secret
metadata:
  name: onyx-pg-backup-s3
  namespace: onyx-infra
type: Opaque
stringData:
  ACCESS_KEY_ID: "change-me"
  SECRET_ACCESS_KEY: "change-me"
