apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-primary
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker-primary
  template:
    metadata:
      labels:
        app: celery-worker-primary
        scope: onyx-backend-celery
    spec:
      containers:
        - name: celery-worker-primary
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["celery","-A","onyx.background.celery.versioned_apps.primary","worker","--loglevel=INFO","--hostname=primary@%n","-Q","celery,periodic_tasks"]
          envFrom:
            - configMapRef:
                name: env-configmap
          env:
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: onyx-postgresql, key: username}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-postgresql, key: password}}
            - name: REDIS_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-redis, key: redis_password}}
            - name: S3_AWS_ACCESS_KEY_ID
              valueFrom: {secretKeyRef: {name: onyx-objectstorage, key: s3_aws_access_key_id}}
            - name: S3_AWS_SECRET_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: onyx-objectstorage, key: s3_aws_secret_access_key}}
            - name: OPENSEARCH_ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: onyx-opensearch, key: opensearch_admin_username}}
            - name: OPENSEARCH_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-opensearch, key: opensearch_admin_password}}
          resources:
            requests: {cpu: "500m", memory: "2Gi"}
            limits: {cpu: "1000m", memory: "4Gi"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-docprocessing
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker-docprocessing
  template:
    metadata:
      labels:
        app: celery-worker-docprocessing
        scope: onyx-backend-celery
    spec:
      containers:
        - name: celery-worker-docprocessing
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["celery","-A","onyx.background.celery.versioned_apps.docprocessing","worker","--pool=threads","--concurrency=6","--prefetch-multiplier=1","--loglevel=INFO","--hostname=docprocessing@%n","-Q","docprocessing"]
          envFrom:
            - configMapRef:
                name: env-configmap
          env:
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: onyx-postgresql, key: username}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-postgresql, key: password}}
            - name: REDIS_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-redis, key: redis_password}}
            - name: S3_AWS_ACCESS_KEY_ID
              valueFrom: {secretKeyRef: {name: onyx-objectstorage, key: s3_aws_access_key_id}}
            - name: S3_AWS_SECRET_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: onyx-objectstorage, key: s3_aws_secret_access_key}}
            - name: OPENSEARCH_ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: onyx-opensearch, key: opensearch_admin_username}}
            - name: OPENSEARCH_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-opensearch, key: opensearch_admin_password}}
          resources:
            requests: {cpu: "500m", memory: "2Gi"}
            limits: {cpu: "1000m", memory: "12Gi"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
        scope: onyx-backend-celery
    spec:
      containers:
        - name: celery-beat
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["celery","-A","onyx.background.celery.versioned_apps.beat","beat","--loglevel=INFO","--schedule=/tmp/celerybeat-schedule"]
          envFrom:
            - configMapRef:
                name: env-configmap
          env:
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: onyx-postgresql, key: username}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-postgresql, key: password}}
            - name: REDIS_PASSWORD
              valueFrom: {secretKeyRef: {name: onyx-redis, key: redis_password}}
          resources:
            requests: {cpu: "500m", memory: "512Mi"}
            limits: {cpu: "1000m", memory: "1Gi"}
