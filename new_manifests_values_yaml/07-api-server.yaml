apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: onyx-infra
spec:
  selector:
    app: api-server
  ports:
    - name: api-server-port
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: onyx-infra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        scope: onyx-backend
    spec:
      initContainers:
        - name: migration
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["/bin/sh", "-c", "alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: env-configmap
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: onyx-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-postgresql
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-redis
                  key: redis_password
            - name: S3_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: onyx-objectstorage
                  key: s3_aws_access_key_id
            - name: S3_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: onyx-objectstorage
                  key: s3_aws_secret_access_key
            - name: OPENSEARCH_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: onyx-opensearch
                  key: opensearch_admin_username
            - name: OPENSEARCH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-opensearch
                  key: opensearch_admin_password
      containers:
        - name: api-server
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["uvicorn", "onyx.main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
              name: api-server-port
          envFrom:
            - configMapRef:
                name: env-configmap
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: onyx-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-postgresql
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-redis
                  key: redis_password
            - name: S3_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: onyx-objectstorage
                  key: s3_aws_access_key_id
            - name: S3_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: onyx-objectstorage
                  key: s3_aws_secret_access_key
            - name: OPENSEARCH_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: onyx-opensearch
                  key: opensearch_admin_username
            - name: OPENSEARCH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-opensearch
                  key: opensearch_admin_password
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /health
              port: api-server-port
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: api-server-port
            initialDelaySeconds: 60
            periodSeconds: 20
