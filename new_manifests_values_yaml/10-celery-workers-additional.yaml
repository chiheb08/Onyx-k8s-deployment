apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-user-file-processing
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker-user-file-processing
  template:
    metadata:
      labels:
        app: celery-worker-user-file-processing
        scope: onyx-backend-celery
    spec:
      containers:
        - name: celery-worker-user-file-processing
          image: onyxdotapp/onyx-backend:v3.1.1
          # user_file_delete moved to 10-celery-worker-user-file-delete-dedicated.yaml
          command: ["celery","-A","onyx.background.celery.versioned_apps.user_file_processing","worker","--loglevel=INFO","--hostname=user-file-processing@%n","-Q","user_file_processing,user_file_project_sync"]
          envFrom: [{configMapRef: {name: env-configmap}}]
          env:
            - {name: POSTGRES_USER, valueFrom: {secretKeyRef: {name: onyx-postgresql, key: username}}}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: onyx-postgresql, key: password}}}
            - {name: REDIS_PASSWORD, valueFrom: {secretKeyRef: {name: onyx-redis, key: redis_password}}}
            - {name: S3_AWS_ACCESS_KEY_ID, valueFrom: {secretKeyRef: {name: onyx-objectstorage, key: s3_aws_access_key_id}}}
            - {name: S3_AWS_SECRET_ACCESS_KEY, valueFrom: {secretKeyRef: {name: onyx-objectstorage, key: s3_aws_secret_access_key}}}
          resources:
            requests: {cpu: "500m", memory: "512Mi"}
            limits: {cpu: "2000m", memory: "2Gi"}
