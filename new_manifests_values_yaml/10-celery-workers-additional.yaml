apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-docfetching
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker-docfetching
  template:
    metadata:
      labels:
        app: celery-worker-docfetching
        scope: onyx-backend-celery
    spec:
      containers:
        - name: celery-worker-docfetching
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["celery","-A","onyx.background.celery.versioned_apps.docfetching","worker","--pool=threads","--concurrency=2","--prefetch-multiplier=1","--loglevel=INFO","--hostname=docfetching@%n","-Q","connector_doc_fetching"]
          envFrom: [{configMapRef: {name: env-configmap}}]
          env:
            - {name: POSTGRES_USER, valueFrom: {secretKeyRef: {name: onyx-postgresql, key: username}}}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: onyx-postgresql, key: password}}}
            - {name: REDIS_PASSWORD, valueFrom: {secretKeyRef: {name: onyx-redis, key: redis_password}}}
          resources:
            requests: {cpu: "500m", memory: "2Gi"}
            limits: {cpu: "1000m", memory: "16Gi"}
---
