apiVersion: v1
kind: Service
metadata:
  name: web-server
  namespace: onyx-infra
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: web-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: onyx-infra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
        - name: web-server
          image: onyxdotapp/onyx-web-server:v3.1.1
          env:
            - name: INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: onyx-config
                  key: INTERNAL_URL
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 2
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
