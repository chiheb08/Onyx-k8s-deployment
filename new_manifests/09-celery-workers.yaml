apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: onyx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["celery", "-A", "onyx.background.celery.versioned_apps.beat", "beat", "--loglevel=INFO"]
          envFrom:
            - configMapRef:
                name: onyx-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
