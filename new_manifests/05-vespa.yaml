apiVersion: v1
kind: Service
metadata:
  name: vespa-service
  namespace: onyx-infra
spec:
  clusterIP: None
  ports:
    - name: config
      port: 19071
      targetPort: 19071
    - name: query
      port: 8081
      targetPort: 8081
  selector:
    app: vespa
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vespa
  namespace: onyx-infra
spec:
  serviceName: vespa-service
  replicas: 1
  selector:
    matchLabels:
      app: vespa
  template:
    metadata:
      labels:
        app: vespa
    spec:
      hostname: vespa-0
      subdomain: vespa-service
      securityContext:
        fsGroup: 1000
      containers:
        - name: vespa
          image: vespaengine/vespa:8.609.39
          env:
            - name: VESPA_SKIP_UPGRADE_CHECK
              value: "true"
          ports:
            - containerPort: 19071
            - containerPort: 8081
          resources:
            requests:
              cpu: 2
              memory: 4Gi
            limits:
              cpu: 6
              memory: 16Gi
          livenessProbe:
            httpGet:
              path: /state/v1/health
              port: 19071
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /state/v1/health
              port: 19071
            initialDelaySeconds: 60
            periodSeconds: 10
