apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: onyx-infra
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: api-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: onyx-infra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        scope: onyx-backend
    spec:
      initContainers:
        - name: migration
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["/bin/sh", "-c", "alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: onyx-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
      containers:
        - name: api-server
          image: onyxdotapp/onyx-backend:v3.1.1
          command: ["uvicorn", "onyx.main:app", "--host", "0.0.0.0", "--port", "8080"]
          envFrom:
            - configMapRef:
                name: onyx-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: S3_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: onyx-s3-secret
                  key: S3_AWS_ACCESS_KEY_ID
            - name: S3_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: onyx-s3-secret
                  key: S3_AWS_SECRET_ACCESS_KEY
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 1
              memory: 2Gi
            limits:
              cpu: 4
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
