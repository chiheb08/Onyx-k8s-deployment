apiVersion: v1
kind: ConfigMap
metadata:
  name: onyx-nginx-config
  namespace: onyx-infra
data:
  default.conf: |
    upstream web_server {
      server web-server.onyx-infra.svc.cluster.local:3000;
    }

    upstream api_server {
      server api-server.onyx-infra.svc.cluster.local:8080;
    }

    server {
      listen 80;

      location /api/ {
        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
      }

      location / {
        proxy_pass http://web_server;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: onyx-infra
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: onyx-infra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.5-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: nginx-config
          configMap:
            name: onyx-nginx-config
