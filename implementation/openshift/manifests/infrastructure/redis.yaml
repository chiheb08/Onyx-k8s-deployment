apiVersion: v1
kind: Service
metadata:
  name: onyx-redis
  namespace: onyx
  labels:
    app: onyx-redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: onyx-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyx-redis
  namespace: onyx
  labels:
    app: onyx-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: onyx-redis
  template:
    metadata:
      labels:
        app: onyx-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - sh
            - -c
            - |
              exec redis-server \
                --requirepass "$REDIS_PASSWORD" \
                --save "" \
                --appendonly no \
                --maxmemory 1536mb \
                --maxmemory-policy allkeys-lru
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 15
            periodSeconds: 20
