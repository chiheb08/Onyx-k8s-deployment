apiVersion: v1
kind: Service
metadata:
  name: onyx-postgres
  namespace: onyx
  labels:
    app: onyx-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: onyx-postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: onyx-postgres
  namespace: onyx
  labels:
    app: onyx-postgres
spec:
  serviceName: onyx-postgres
  replicas: 1
  selector:
    matchLabels:
      app: onyx-postgres
  template:
    metadata:
      labels:
        app: onyx-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15.2-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: onyx-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onyx-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: onyx-config
                  key: POSTGRES_DB
          args:
            - "-c"
            - "max_connections=500"
            - "-c"
            - "shared_buffers=1GB"
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
