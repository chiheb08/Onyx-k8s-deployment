# IMPORTANT: Replace ALL CHANGEME_* values before production deploy.
# Prefer: oc create secret generic onyx-secrets --from-literal=... -n onyx
# and delete this file from kustomization if using external secret management.
apiVersion: v1
kind: Secret
metadata:
  name: onyx-secrets
  namespace: onyx
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: "CHANGEME_postgres_Strong1!"
  REDIS_PASSWORD: "CHANGEME_redis_Strong1!"
  OPENSEARCH_ADMIN_USERNAME: admin
  OPENSEARCH_ADMIN_PASSWORD: "CHANGEME_OS_Strong1!"
  S3_AWS_ACCESS_KEY_ID: minioadmin
  S3_AWS_SECRET_ACCESS_KEY: "CHANGEME_minio_Strong1!"
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: "CHANGEME_minio_Strong1!"
  USER_AUTH_SECRET: "CHANGEME_openssl_rand_hex_32"
