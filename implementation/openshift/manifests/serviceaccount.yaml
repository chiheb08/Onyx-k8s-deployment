apiVersion: v1
kind: ServiceAccount
metadata:
  name: onyx
  namespace: onyx
---
# Grant anyuid to model-server pods on OpenShift (required for embedding models).
# Apply after namespace exists:
#   oc adm policy add-scc-to-user anyuid -z onyx -n onyx
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: onyx-anyuid
  namespace: onyx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: onyx
    namespace: onyx
