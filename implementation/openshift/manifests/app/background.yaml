# Celery beat + all workers (same as docker-compose `background` service / supervisord)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyx-background
  namespace: onyx
  labels:
    app: onyx-background
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: onyx-background
  template:
    metadata:
      labels:
        app: onyx-background
    spec:
      serviceAccountName: onyx
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-postgres 5432; do sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-redis 6379; do sleep 2; done"]
        - name: wait-for-opensearch
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-opensearch 9200; do sleep 5; done"]
        - name: wait-for-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-minio 9000; do sleep 2; done"]
        - name: wait-for-inference-model
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-inference-model 9000; do sleep 5; done"]
        - name: wait-for-indexing-model
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-indexing-model 9000; do sleep 5; done"]
        - name: wait-for-api
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-api-server 8080; do sleep 5; done"]
      containers:
        - name: background
          image: onyxdotapp/onyx-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - /app/scripts/supervisord_entrypoint.sh
          envFrom:
            - configMapRef:
                name: onyx-config
            - secretRef:
                name: onyx-secrets
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f supervisord
            initialDelaySeconds: 120
            periodSeconds: 30
