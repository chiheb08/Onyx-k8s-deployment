# Dedicated Celery workers (Helm-style) — sized for ~50 concurrent users.
# Craft scheduled_tasks worker omitted (ENABLE_CRAFT=false).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyx-celery-beat
  namespace: onyx
  labels:
    app: onyx-celery-beat
    component: celery
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: onyx-celery-beat
  template:
    metadata:
      labels:
        app: onyx-celery-beat
        component: celery
    spec:
      serviceAccountName: onyx
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-redis 6379; do sleep 2; done"]
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-postgres 5432; do sleep 2; done"]
      containers:
        - name: celery-beat
          image: onyxdotapp/onyx-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "onyx.background.celery.versioned_apps.beat", "beat"]
          envFrom:
            - configMapRef:
                name: onyx-config
            - secretRef:
                name: onyx-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            exec:
              command: ["test", "-f", "/app/onyx/main.py"]
            failureThreshold: 24
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyx-celery-worker-primary
  namespace: onyx
