    app: onyx-celery-worker-primary
    component: celery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onyx-celery-worker-primary
  template:
    metadata:
      labels:
        app: onyx-celery-worker-primary
        component: celery
    spec:
      serviceAccountName: onyx
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-postgres 5432; do sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-redis 6379; do sleep 2; done"]
        - name: wait-for-opensearch
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-opensearch 9200; do sleep 5; done"]
        - name: wait-for-api
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-api-server 8080; do sleep 5; done"]
      containers:
        - name: worker
          image: onyxdotapp/onyx-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - onyx.background.celery.versioned_apps.primary
            - worker
            - --hostname=primary@%n
            - -Q
            - celery
          envFrom:
            - configMapRef:
                name: onyx-config
            - secretRef:
                name: onyx-secrets
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            exec:
              command: ["test", "-f", "/app/onyx/main.py"]
            failureThreshold: 24
            periodSeconds: 5
