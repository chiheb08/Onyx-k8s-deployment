apiVersion: v1
kind: Service
metadata:
  name: onyx-indexing-model
  namespace: onyx
  labels:
    app: onyx-indexing-model
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: modelserver
  selector:
    app: onyx-indexing-model
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyx-indexing-model
  namespace: onyx
  labels:
    app: onyx-indexing-model
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: onyx-indexing-model
  template:
    metadata:
      labels:
        app: onyx-indexing-model
    spec:
      serviceAccountName: onyx
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-postgres 5432; do sleep 2; done"]
      containers:
        - name: indexing-model
          image: onyxdotapp/onyx-model-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: modelserver
          env:
            - name: INDEXING_ONLY
              value: "True"
          envFrom:
            - configMapRef:
                name: onyx-config
            - secretRef:
                name: onyx-secrets
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "4"
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
