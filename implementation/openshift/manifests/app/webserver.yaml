apiVersion: v1
kind: Service
metadata:
  name: onyx-webserver
  namespace: onyx
  labels:
    app: onyx-webserver
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: onyx-webserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyx-webserver
  namespace: onyx
  labels:
    app: onyx-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onyx-webserver
  template:
    metadata:
      labels:
        app: onyx-webserver
    spec:
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z onyx-api-server 8080; do sleep 3; done"]
      containers:
        - name: web-server
          image: onyxdotapp/onyx-web-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: onyx-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
